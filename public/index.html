<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EloSaúde — Análise de Exames</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --teal-50: #E0F7F4;
      --teal-500: #00ACC1;
      --teal-600: #00838F;
      --teal-800: #006064;
      --orange-50: #FFF4E6;
      --orange-100: #FFE0B2;
      --orange-500: #F57C00;
      --orange-600: #E65100;
      --neutral-50: #FAFAF9;
      --neutral-100: #F5F4F1;
      --neutral-200: #E8E7E3;
      --neutral-400: #9E9D97;
      --neutral-600: #5F5E5A;
      --neutral-800: #2C2C2A;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--neutral-100);
      color: var(--neutral-800);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem;
    }

    /* HEADER */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .logo-wrap {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--teal-600), var(--teal-800));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(0,131,143,0.30);
    }

    .logo-icon svg { width: 26px; height: 26px; }

    .logo-name {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .logo-name .elo { color: var(--teal-600); }
    .logo-name .saude { color: var(--orange-500); }

    header p {
      font-size: 14px;
      color: var(--neutral-400);
      font-weight: 300;
      letter-spacing: 0.02em;
    }

    /* CARD */
    .card {
      background: white;
      border: 1px solid var(--neutral-200);
      border-radius: 20px;
      padding: 2.5rem;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05), 0 8px 32px rgba(0,0,0,0.04);
    }

    .field { margin-bottom: 1.5rem; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--neutral-400);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    input[type="text"] {
      width: 100%;
      padding: 11px 16px;
      border: 1.5px solid var(--neutral-200);
      border-radius: 10px;
      font-family: var(--font-body);
      font-size: 14px;
      color: var(--neutral-800);
      background: var(--neutral-50);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--teal-500);
      box-shadow: 0 0 0 3px rgba(0,172,193,0.12);
      background: white;
    }

    input[type="text"]::placeholder { color: var(--neutral-400); }

    /* UPLOAD */
    .upload-area {
      border: 2px dashed var(--neutral-200);
      border-radius: 14px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--neutral-50);
      position: relative;
    }

    .upload-area:hover {
      border-color: var(--teal-500);
      background: var(--teal-50);
    }

    .upload-area.selected {
      border-color: var(--teal-500);
      border-style: solid;
      background: var(--teal-50);
    }

    .upload-icon-wrap {
      width: 52px;
      height: 52px;
      margin: 0 auto 14px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,131,143,0.15);
      transition: all 0.2s;
    }

    .upload-area:hover .upload-icon-wrap,
    .upload-area.selected .upload-icon-wrap {
      background: var(--teal-600);
      box-shadow: 0 4px 14px rgba(0,131,143,0.30);
    }

    .upload-icon-wrap svg {
      width: 22px;
      height: 22px;
      stroke: var(--teal-600);
      fill: none;
      stroke-width: 2;
      transition: stroke 0.2s;
    }

    .upload-area:hover .upload-icon-wrap svg,
    .upload-area.selected .upload-icon-wrap svg { stroke: white; }

    .upload-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--teal-600);
      margin-bottom: 4px;
      transition: color 0.2s;
    }

    .upload-sub {
      font-size: 12px;
      color: var(--neutral-400);
    }

    /* DIVIDER */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1.5rem 0;
      color: var(--neutral-400);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--neutral-200);
    }

    /* BTN */
    .btn-analyze {
      width: 100%;
      padding: 14px 20px;
      background: linear-gradient(135deg, var(--orange-500), var(--orange-600));
      color: white;
      border: none;
      border-radius: 12px;
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.01em;
      box-shadow: 0 4px 14px rgba(245,124,0,0.25);
    }

    .btn-analyze:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(245,124,0,0.35);
    }

    .btn-analyze:active:not(:disabled) { transform: translateY(0); }

    .btn-analyze:disabled {
      background: var(--neutral-200);
      color: var(--neutral-400);
      cursor: not-allowed;
      box-shadow: none;
    }

    /* STATUS */
    .status {
      text-align: center;
      font-size: 13px;
      color: var(--neutral-400);
      margin-top: 14px;
      min-height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--neutral-200);
      border-top-color: var(--teal-600);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ERROR */
    .error-box {
      margin-top: 1rem;
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-left: 4px solid #EF4444;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #B91C1C;
      display: none;
    }

    /* RESULT */
    #resultContainer {
      display: none;
      width: 100%;
      max-width: 900px;
      margin-top: 2rem;
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: 10px;
    }

    .result-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 600;
      color: var(--teal-600);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .result-actions { display: flex; gap: 8px; }

    .btn-sm {
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      border: none;
      transition: all 0.2s;
    }

    .btn-print {
      background: var(--orange-500);
      color: white;
      box-shadow: 0 2px 8px rgba(245,124,0,0.25);
    }
    .btn-print:hover { background: var(--orange-600); }

    .btn-reset {
      background: white;
      color: var(--neutral-600);
      border: 1.5px solid var(--neutral-200) !important;
    }
    .btn-reset:hover { background: var(--neutral-50); }

    #resultFrame {
      width: 100%;
      height: 82vh;
      border: 1px solid var(--neutral-200);
      border-radius: 16px;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    /* FOOTER */
    footer {
      margin-top: 2.5rem;
      font-size: 12px;
      color: var(--neutral-400);
      text-align: center;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    footer::before, footer::after {
      content: '';
      width: 20px;
      height: 1px;
      background: var(--neutral-200);
    }
  </style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 4C8 4 5 7 5 11C5 13.5 6.5 15.5 8 17L9 20H15L16 17C17.5 15.5 19 13.5 19 11C19 7 16 4 12 4Z" fill="white" opacity="0.9"/>
        <path d="M10 11H14M12 9V13" stroke="var(--teal-600)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="logo-name"><span class="elo">Elo</span><span class="saude">Saúde</span></div>
  </div>
  <p>Análise inteligente de exames laboratoriais</p>
</header>

<div class="card">
  <div class="field">
    <label>Nome do paciente</label>
    <input type="text" id="patientName" placeholder="Ex: Maria Silva (opcional)" />
  </div>

  <div class="field">
    <label>PDF do exame</label>
    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon-wrap">
        <svg viewBox="0 0 24 24"><path d="M12 15V3m0 0L8 7m4-4l4 4"/><path d="M2 17l.621 2.485A2 2 0 004.561 21H19.44a2 2 0 001.94-1.515L22 17"/></svg>
      </div>
      <div class="upload-title" id="uploadText">Clique para selecionar</div>
      <div class="upload-sub">Somente arquivos .pdf</div>
    </div>
    <input type="file" id="fileInput" accept=".pdf" style="display:none" onchange="handleFile(this)" />
  </div>

  <button class="btn-analyze" id="analyzeBtn" onclick="analyze()" disabled>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35M11 8v6M8 11h6"/>
    </svg>
    Analisar exame
  </button>

  <div class="status" id="status">
    <div class="spinner" id="spinner"></div>
    <span id="statusText"></span>
  </div>

  <div class="error-box" id="errorBox"></div>
</div>

<div id="resultContainer">
  <div class="result-header">
    <div class="result-title">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      Análise concluída
    </div>
    <div class="result-actions">
      <button class="btn-sm btn-print" onclick="printResult()">Imprimir / PDF</button>
      <button class="btn-sm btn-reset" onclick="resetForm()">Novo exame</button>
    </div>
  </div>
  <iframe id="resultFrame"></iframe>
</div>

<footer>Powered by Claude AI &nbsp;·&nbsp; EloSaúde</footer>

<script>
  const API_URL = '/api/analyze';
  let pdfBase64 = null;

  function handleFile(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      pdfBase64 = e.target.result.split(',')[1];
      document.getElementById('uploadText').textContent = file.name;
      document.getElementById('uploadArea').classList.add('selected');
      document.getElementById('analyzeBtn').disabled = false;
    };
    reader.readAsDataURL(file);
  }

  async function analyze() {
    const btn = document.getElementById('analyzeBtn');
    const spinner = document.getElementById('spinner');
    const statusText = document.getElementById('statusText');
    const errorBox = document.getElementById('errorBox');
    const patientName = document.getElementById('patientName').value || 'Paciente';

    btn.disabled = true;
    spinner.style.display = 'block';
    statusText.textContent = 'Analisando exame, aguarde...';
    errorBox.style.display = 'none';

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pdfBase64, patientName })
      });

      const data = await res.json();

      if (!res.ok || !data.success) {
        throw new Error(data.error || 'Erro ao processar o exame');
      }

      const htmlContent = atob(data.html);
      const frame = document.getElementById('resultFrame');
      frame.srcdoc = htmlContent;
      document.getElementById('resultContainer').style.display = 'block';
      document.getElementById('resultContainer').scrollIntoView({ behavior: 'smooth' });
      statusText.textContent = '';
      spinner.style.display = 'none';

    } catch (err) {
      errorBox.textContent = 'Erro: ' + err.message;
      errorBox.style.display = 'block';
      statusText.textContent = '';
      spinner.style.display = 'none';
    } finally {
      btn.disabled = false;
    }
  }

  function printResult() {
    document.getElementById('resultFrame').contentWindow.print();
  }

  function resetForm() {
    document.getElementById('resultContainer').style.display = 'none';
    document.getElementById('patientName').value = '';
    document.getElementById('uploadText').textContent = 'Clique para selecionar';
    document.getElementById('uploadArea').classList.remove('selected');
    document.getElementById('analyzeBtn').disabled = true;
    document.getElementById('fileInput').value = '';
    pdfBase64 = null;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>

</body>
</html>
