<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EloSaúde — Analisador de Exames</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #1D9E75;
      --green-light: #E1F5EE;
      --green-dark: #0F6E56;
      --text: #1a1a1a;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --bg: #f9fafb;
      --white: #ffffff;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.05);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 0.75rem;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--green);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg { width: 22px; height: 22px; fill: white; }

    .logo-name {
      font-family: 'DM Serif Display', serif;
      font-size: 24px;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    header p {
      font-size: 15px;
      color: var(--text-muted);
      font-weight: 300;
    }

    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 540px;
      box-shadow: var(--shadow);
    }

    .field { margin-bottom: 1.25rem; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      background: var(--white);
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: var(--green); }
    input[type="text"]::placeholder { color: #c0c0c0; }

    .upload-area {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--bg);
    }

    .upload-area:hover { border-color: var(--green); background: var(--green-light); }

    .upload-area.selected {
      border-color: var(--green);
      background: var(--green-light);
    }

    .upload-icon {
      width: 44px;
      height: 44px;
      margin: 0 auto 12px;
      background: var(--green-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .upload-area.selected .upload-icon { background: white; }

    .upload-icon svg { width: 22px; height: 22px; stroke: var(--green); fill: none; stroke-width: 1.8; }

    .upload-area p { font-size: 14px; color: var(--text-muted); }
    .upload-area p strong { color: var(--green); font-weight: 500; }
    .upload-area small { font-size: 12px; color: #c0c0c0; display: block; margin-top: 4px; }

    .btn {
      width: 100%;
      padding: 13px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 1.25rem;
    }

    .btn-primary {
      background: var(--green);
      color: white;
    }

    .btn-primary:hover { background: var(--green-dark); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { background: #c0c0c0; cursor: not-allowed; transform: none; }

    .status {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 12px;
      min-height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      margin-top: 1rem;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: #b91c1c;
      display: none;
    }

    footer {
      margin-top: 2rem;
      font-size: 12px;
      color: #c0c0c0;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M11 7h2v5h3l-4 5-4-5h3z"/>
      </svg>
    </div>
    <span class="logo-name">EloSaúde</span>
  </div>
  <p>Análise inteligente de exames laboratoriais</p>
</header>

<div class="card">
  <div class="field">
    <label>Nome do paciente</label>
    <input type="text" id="patientName" placeholder="Ex: João Silva (opcional)" />
  </div>

  <div class="field">
    <label>PDF do exame</label>
    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon">
        <svg viewBox="0 0 24 24"><path d="M12 16V8m0 0l-3 3m3-3l3 3"/><rect x="3" y="3" width="18" height="18" rx="3"/></svg>
      </div>
      <p><strong id="uploadText">Clique para selecionar</strong></p>
      <small>Somente arquivos .pdf</small>
    </div>
    <input type="file" id="fileInput" accept=".pdf" style="display:none" onchange="handleFile(this)" />
  </div>

  <button class="btn btn-primary" id="analyzeBtn" onclick="analyze()" disabled>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35M11 8v6M8 11h6"/></svg>
    Analisar exame
  </button>

  <div class="status" id="status">
    <div class="spinner" id="spinner"></div>
    <span id="statusText"></span>
  </div>

  <div class="error-box" id="errorBox"></div>
</div>

<!-- Resultado aparece aqui na mesma página -->
<div id="resultContainer" style="display:none; width:100%; max-width:860px; margin-top:2rem;">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
    <span style="font-weight:600; color:var(--green);">✅ Análise concluída</span>
    <div style="display:flex; gap:8px;">
      <button onclick="printResult()" style="padding:8px 16px; background:var(--green); color:white; border:none; border-radius:8px; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:13px;">🖨️ Imprimir / Salvar PDF</button>
      <button onclick="resetForm()" style="padding:8px 16px; background:white; color:var(--text-muted); border:1px solid var(--border); border-radius:8px; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:13px;">↻ Novo exame</button>
    </div>
  </div>
  <iframe id="resultFrame" style="width:100%; height:80vh; border:1px solid var(--border); border-radius:var(--radius); background:white;"></iframe>
</div>

<footer>Powered by Claude AI · EloSaúde</footer>

<script>
  const API_URL = '/api/analyze';
  let pdfBase64 = null;

  function handleFile(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      pdfBase64 = e.target.result.split(',')[1];
      document.getElementById('uploadText').textContent = file.name;
      document.getElementById('uploadArea').classList.add('selected');
      document.getElementById('analyzeBtn').disabled = false;
    };
    reader.readAsDataURL(file);
  }

  async function analyze() {
    const btn = document.getElementById('analyzeBtn');
    const spinner = document.getElementById('spinner');
    const statusText = document.getElementById('statusText');
    const errorBox = document.getElementById('errorBox');
    const patientName = document.getElementById('patientName').value || 'Paciente';

    btn.disabled = true;
    spinner.style.display = 'block';
    statusText.textContent = 'Analisando exame, aguarde...';
    errorBox.style.display = 'none';

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pdfBase64, patientName })
      });

      const data = await res.json();

      if (!res.ok || !data.success) {
        throw new Error(data.error || 'Erro ao processar o exame');
      }

      const htmlContent = atob(data.html);
      const frame = document.getElementById('resultFrame');
      frame.srcdoc = htmlContent;
      document.getElementById('resultContainer').style.display = 'block';
      document.getElementById('resultContainer').scrollIntoView({ behavior: 'smooth' });
      statusText.textContent = '';

    } catch (err) {
      errorBox.textContent = 'Erro: ' + err.message;
      errorBox.style.display = 'block';
      statusText.textContent = '';
    } finally {
      btn.disabled = false;
      spinner.style.display = 'none';
    }
  }

  function printResult() {
    const frame = document.getElementById('resultFrame');
    frame.contentWindow.print();
  }

  function resetForm() {
    document.getElementById('resultContainer').style.display = 'none';
    document.getElementById('patientName').value = '';
    document.getElementById('uploadText').textContent = 'Clique para selecionar';
    document.getElementById('uploadArea').classList.remove('selected');
    document.getElementById('analyzeBtn').disabled = true;
    document.getElementById('fileInput').value = '';
    pdfBase64 = null;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>

</body>
</html>
